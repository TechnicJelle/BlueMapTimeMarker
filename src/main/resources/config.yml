# Marker Set Options
# Documentation: https://bluemap.bluecolored.de/wiki/customization/Markers.html#marker-sets
MarkerSetName: "Time Marker"
Toggleable: true
DefaultHidden: false

# Whether the marker is in the world or in the UI
InWorld: true

x: 0.5
y: 64.0
z: 0.5

# Available placeholders: `{{ticks}}`, `{{HH}}` and `{{MM}}`
HTML: "<div style='line-height: 2em; font-family: monospace; font-size: 2em; color: white; text-shadow: black 0 0 1em, black 0 0 0.1em; transform: translate(-50%, -50%);'>{{HH}}:{{MM}}</div>"
